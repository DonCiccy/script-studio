<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090b;color:#f4f4f5;font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;font-size:13px}
textarea{resize:vertical}
details>summary{list-style:none;cursor:pointer}
details>summary::-webkit-details-marker{display:none}
button:focus-visible,summary:focus-visible{outline:2px solid #f59e0b;outline-offset:2px;border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
/* fonts */
.ff{font-family:Fraunces,Georgia,serif}
.fm{font-family:'IBM Plex Mono',Menlo,monospace}
/* page */
.page{min-height:100vh;background:#09090b}
.wrap{max-width:780px;margin:0 auto;padding:48px 24px}
/* text */
.h1{font-size:clamp(32px,5vw,48px);font-weight:700;letter-spacing:-.02em;color:#f4f4f5}
.h2{font-size:18px;font-weight:600;color:#f4f4f5}
.sm{font-size:13px}
.xs{font-size:11px}
.caps{text-transform:uppercase;letter-spacing:.08em}
.dim{color:#a1a1aa}
.muted{color:#71717a}
.c-amber{color:#f59e0b}
.c-teal{color:#2dd4bf}
.c-rose{color:#fb7185}
.c-inv{color:#09090b}
.semi{font-weight:600}
.bold{font-weight:700}
.prewrap{white-space:pre-wrap}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lh-snug{line-height:1.35}
.lh-loose{line-height:1.7}
/* layout */
.flex{display:flex}
.col{flex-direction:column}
.wrap-{flex-wrap:wrap}
.items-c{align-items:center}
.items-s{align-items:flex-start}
.just-c{justify-content:center}
.just-b{justify-content:space-between}
.just-e{justify-content:flex-end}
.g1{gap:4px}.g2{gap:8px}.g3{gap:12px}.g4{gap:16px}.g6{gap:24px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.f1{flex:1}
.min0{min-width:0}
.shrink0{flex-shrink:0}
.wfull{width:100%}
.hpx{height:1px}
.w28h28{width:28px;height:28px}
.w32h32{width:32px;height:32px}
.mx-auto{margin:0 auto}
.max-md{max-width:480px}
.max-2xl{max-width:660px}
/* spacing */
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}
.mb4{margin-bottom:16px}.mb5{margin-bottom:20px}.mb6{margin-bottom:24px}.mb8{margin-bottom:32px}
.mt2{margin-top:8px}.mt3{margin-top:12px}
.mx2{margin-left:8px;margin-right:8px}
.p3{padding:12px}.p4{padding:16px}.p8{padding:32px}
.px2{padding-left:8px;padding-right:8px}
.px3{padding-left:12px;padding-right:12px}
.px4{padding-left:16px;padding-right:16px}
.px5{padding-left:20px;padding-right:20px}
.px6{padding-left:24px;padding-right:24px}
.py1{padding-top:4px;padding-bottom:4px}
.py2{padding-top:8px;padding-bottom:8px}
.py3{padding-top:12px;padding-bottom:12px}
.py4{padding-top:16px;padding-bottom:16px}
.py6{padding-top:24px;padding-bottom:24px}
.space4>*+*{margin-top:16px}
.space5>*+*{margin-top:20px}
.space8>*+*{margin-top:32px}
.space10>*+*{margin-top:40px}
/* borders */
.border{border:1px solid #27272a}
.border-t{border-top:1px solid #27272a}
.border-b{border-bottom:1px solid #27272a}
.border-dash{border:1px dashed #27272a}
.border-amber{border-color:#f59e0b!important}
.r{border-radius:6px}.rlg{border-radius:8px}.rfull{border-radius:9999px}
.overflow-h{overflow:hidden}
/* backgrounds */
.bg-base{background:#09090b}
.bg-s{background:#18181b}
.bg-amber{background:#f59e0b}
.bg-amber-dk{background:#1c1407}
.bg-zinc{background:#f4f4f5}
/* transitions */
.t{transition:color .15s,background .15s,border-color .15s}
.sel-none{user-select:none}
/* ── NAV ── */
.nav{display:flex;gap:4px;border-bottom:1px solid #27272a;margin-bottom:32px}
.ntab{display:flex;align-items:center;gap:6px;padding:10px 16px;font-size:12px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid transparent;color:#71717a;transition:color .15s,border-color .15s}
.ntab:hover{color:#d4d4d8}
.ntab.on{border-bottom-color:#f59e0b;color:#f4f4f5}
/* ── SECTION HEAD ── */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sh span{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;white-space:nowrap}
.sh .rule{flex:1;height:1px;background:#27272a}
/* ── PLATFORM BUTTONS ── */
.plat-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 12px;border:1px solid #27272a;border-radius:8px;background:#18181b;color:#71717a;transition:border-color .15s,color .15s,background .15s}
.plat-btn:hover{border-color:#3f3f46;color:#d4d4d8}
.plat-btn.on{border-color:#f59e0b;background:#1c1407;color:#fbbf24}
.plat-btn span{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
/* ── OBJECTIVE BUTTONS ── */
.obj-btn{display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:12px 16px;border:1px solid #27272a;border-radius:8px;background:#18181b;text-align:left;transition:border-color .15s,background .15s}
.obj-btn:hover{border-color:#3f3f46}
.obj-btn.on{border-color:#f59e0b;background:#1c1407}
.obj-label{font-size:13px;font-weight:500;color:#d4d4d8}
.obj-btn.on .obj-label{color:#fbbf24}
.obj-desc{font-size:11px;color:#71717a;line-height:1.35}
/* ── IDEA CARDS ── */
.idea-card{padding:14px;border:1px solid #27272a;border-radius:8px;background:#18181b;cursor:pointer;transition:border-color .15s,background .15s}
.idea-card:hover{border-color:#3f3f46}
.idea-card.on{border-color:#f59e0b;background:#1c1407}
.idea-title{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.35;color:#f4f4f5}
.idea-card.on .idea-title{color:#fbbf24}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.badge{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;padding:2px 8px;border-radius:3px;background:#27272a}
.ba{color:#f59e0b}.bt{color:#2dd4bf}
.idea-angle{font-size:11px;color:#71717a;line-height:1.35;margin-bottom:12px}
.ia-row{display:flex;align-items:center;justify-content:space-between}
.ia-use{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;color:#71717a}
.idea-card.on .ia-use{color:#f59e0b}
.ia-save{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;color:#52525b;transition:color .15s}
.ia-save:hover{color:#a1a1aa}
.ia-save.saved{color:#f59e0b}
/* ── CHIPS ── */
.chip{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 10px;border-radius:9999px;border:1px solid #3f3f46;color:#d4d4d8;transition:all .15s}
.chip:hover{border-color:#f59e0b;color:#fbbf24}
.chip.on{border-color:#f59e0b;color:#fbbf24;background:#1c1407}
.chip-add{border-style:dashed;border-color:#3f3f46;color:#71717a}
.chip-add:hover{border-color:#71717a;color:#a1a1aa}
/* ── BUTTONS ── */
.btn-p{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:6px;background:#f59e0b;color:#09090b;font-weight:600;font-size:14px;transition:background .15s}
.btn-p:hover{background:#fbbf24}
.btn-p:disabled{background:#27272a;color:#52525b;cursor:not-allowed}
.btn-o{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid #3f3f46;border-radius:6px;background:#18181b;color:#d4d4d8;font-size:13px;font-weight:500;transition:all .15s}
.btn-o:hover{background:#27272a;border-color:#52525b}
.btn-o:disabled{opacity:.5;cursor:not-allowed}
.btn-g{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#71717a;transition:color .15s}
.btn-g:hover{color:#f59e0b}
.btn-g:disabled{color:#3f3f46}
.btn-sv{border-radius:6px;background:#f4f4f5;color:#09090b;font-weight:600;font-size:13px;padding:10px 20px;transition:background .15s}
.btn-sv:hover{background:#fff}
.btn-sq{display:flex;align-items:center;justify-content:center;border:1px solid #3f3f46;border-radius:6px;color:#a1a1aa;transition:all .15s}
.btn-sq:hover{border-color:#71717a;color:#f4f4f5}
.btn-sq:disabled{color:#3f3f46;border-color:#27272a}
.btn-rnd{font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;border:1px solid #3f3f46;border-radius:6px;color:#a1a1aa;transition:all .15s}
.btn-rnd:hover{border-color:#71717a;color:#d4d4d8}
.btn-rnd.on{background:#f4f4f5;border-color:#f4f4f5;color:#09090b}
.btn-del{color:#52525b;transition:color .15s;padding:2px}
.btn-del:hover{color:#fb7185}
.btn-cp{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;color:#71717a;transition:color .15s}
.btn-cp:hover{color:#f4f4f5}
/* ── INPUTS ── */
.inp,.ta{width:100%;border:1px solid #27272a;border-radius:6px;background:#18181b;color:#f4f4f5;font-size:13px;padding:10px 12px;outline:none;transition:border-color .15s}
.inp::placeholder,.ta::placeholder{color:#52525b}
.inp:focus,.ta:focus{border-color:#f59e0b}
.ta{line-height:1.5}
.qa-inp{border:1px solid #f59e0b;border-radius:6px;background:#18181b;color:#f4f4f5;font-size:13px;padding:6px 12px;outline:none;flex:1}
/* ── CARD ── */
.card{border:1px solid #27272a;border-radius:8px;background:#18181b;overflow:hidden}
.card-h{padding:8px 16px;border-bottom:1px solid #27272a;background:#09090b}
.card-b{padding:20px}
.card-f{padding:12px 16px;border-top:1px solid #27272a}
.vl{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#f59e0b}
/* ── KB ITEMS ── */
.kbi{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:10px 12px;border:1px solid #27272a;border-radius:6px;background:#18181b}
.kbi-label{font-size:13px;color:#d4d4d8}
.kbi-sub{font-size:11px;color:#71717a;margin-top:2px}
/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 16px;border:1px dashed #27272a;border-radius:8px}
/* ── UPLOAD ── */
.upload{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px 16px;border:1px dashed #3f3f46;border-radius:6px;background:#18181b;cursor:pointer;transition:border-color .15s;text-align:center}
.upload:hover{border-color:#71717a}
/* ── SETUP ── */
.setup-page{min-height:100vh;background:#09090b;display:flex;align-items:center;justify-content:center;padding:32px}
.setup-box{max-width:440px;width:100%}
.sdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s}
.sdot.done{background:#f59e0b;color:#09090b}
.sdot.todo{background:#27272a;color:#52525b}
.sline{flex:1;height:1px;margin:0 8px;transition:background .15s}
.sline.done{background:#f59e0b}
.sline.todo{background:#27272a}
.code-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;background:#27272a;padding:2px 6px;border-radius:3px;color:#f59e0b}
/* ── LINK ── */
.link{color:#f59e0b;transition:color .15s}
.link:hover{color:#fbbf24}
/* responsive */
@media(max-width:560px){
  .grid4{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .wrap{padding:32px 16px}
  .btn-p{width:100%}
}
</style>

<style>
/* ── TELEPROMPTER ── */
.tp-overlay{position:fixed;inset:0;background:#000;z-index:300;overflow-y:auto;cursor:pointer}
.tp-content{max-width:800px;margin:0 auto;padding:80px 40px 140px;cursor:default}

function kbToStr(kb){
  const s=[];

  s.push((S.conf?.brand||'Brand')+'\n'+(kb.brand||''));
  if(kb.proofPoints&&kb.proofPoints.length) s.push('PROOF POINTS\n'+kb.proofPoints.map(p=>'• '+p.text).join('\n'));
  if(kb.pillars&&kb.pillars.length) s.push('CONTENT PILLARS\n'+kb.pillars.map(p=>'• '+p.title+(p.desc?': '+p.desc:'')).join('\n'));
  if(kb.links&&kb.links.length){
    const fetched=kb.links.filter(l=>l.text&&l.text.length>0);
    const unfetched=kb.links.filter(l=>!l.text||l.text.length===0);
    if(fetched.length) s.push('WEBSITE CONTENT\n'+fetched.map(l=>'['+l.url+']\n'+l.text.slice(0,3000)).join('\n\n'));
    if(unfetched.length) s.push('REFERENCE URLS\n'+unfetched.map(l=>l.url).join('\n'));
  }
  if(kb.styleExamples&&kb.styleExamples.length) s.push('REFERENCE SCRIPTS — examples of your voice and style, match closely:\n'+kb.styleExamples.map(e=>'['+e.title+']\n'+e.text).join('\n\n'));

  return s.join('\n\n');
}

function parseGemini(d){
  const parts=d?.candidates?.[0]?.content?.parts||[];
  const real=parts.find(p=>!p.thought&&p.text)||parts[parts.length-1];
  return real?.text||'';
}
async function callGemini(sys,user,maxTokens,attempt){
  attempt=attempt||1;
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${S.model}:generateContent?key=${S.keys.gemini}`;
  const rsp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    system_instruction:{parts:[{text:sys}]},
    contents:[{role:'user',parts:[{text:user}]}],
    generationConfig:{maxOutputTokens:maxTokens||4000,temperature:1.4}
  })});
  if(!rsp.ok){const e=await rsp.json().catch(()=>({}));
    if((rsp.status===503||rsp.status===429)&&attempt<4){await new Promise(r=>setTimeout(r,attempt*3000));return callGemini(sys,user,maxTokens,attempt+1);}
    throw new Error(e?.error?.message||'API error '+rsp.status);}
  return parseGemini(await rsp.json());
}
async function callAnthropic(sys,user,maxTokens){
  const rsp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.keys.anthropic,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({
    model:S.model, max_tokens:maxTokens||2000, system:sys, messages:[{role:'user',content:user}]
  })});
  if(!rsp.ok){const e=await rsp.json().catch(()=>({}));throw new Error(e?.error?.message||'API error '+rsp.status);}
  const d=await rsp.json();return d?.content?.[0]?.text||'';
}
async function callOpenAI(sys,user,maxTokens){
  const rsp=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.keys.openai},body:JSON.stringify({
    model:S.model, max_tokens:maxTokens||2000,
    messages:[{role:'system',content:sys},{role:'user',content:user}]
  })});
  if(!rsp.ok){const e=await rsp.json().catch(()=>({}));throw new Error(e?.error?.message||'API error '+rsp.status);}
  const d=await rsp.json();return d?.choices?.[0]?.message?.content||'';
}
async function callAI(sys,user,maxTokens){
  if(S.provider==='gemini')    return callGemini(sys,user,maxTokens);
  if(S.provider==='anthropic') return callAnthropic(sys,user,maxTokens);
  if(S.provider==='openai')    return callOpenAI(sys,user,maxTokens);
  throw new Error('Unknown provider');
}
async function callAIPDF(b64,user){
  if(S.provider==='gemini'){
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${S.model}:generateContent?key=${S.keys.gemini}`;
    const rsp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:'application/pdf',data:b64}},{text:user}]}],generationConfig:{maxOutputTokens:1000}})});
    if(!rsp.ok)throw new Error();return parseGemini(await rsp.json());
  }
  if(S.provider==='anthropic'){
    const rsp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.keys.anthropic,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:S.model,max_tokens:1000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:user}]}]})});
    if(!rsp.ok)throw new Error();const d=await rsp.json();return d?.content?.[0]?.text||'';
  }
  // openai: no native PDF support, skip
  throw new Error('PDF upload not supported for OpenAI — use paste text instead.');
}

// ── TELEPROMPTER ENGINE ───────────────────────────────────
const TP={active:false,speed:3,raf:null,lastTime:null};
// speed levels in px/second
const TP_SPEEDS=[25,45,70,100,140];
function tpPxSpeed(){return TP_SPEEDS[Math.max(0,Math.min(4,TP.speed-1))];}
function tpSpeedLabel(){return['Slow','','Normal','','Fast'][TP.speed-1]||'';}
function tpPlay(){
  if(TP.active)return;
  TP.active=true;TP.lastTime=null;
  TP.raf=requestAnimationFrame(tpFrame);
  tpUpdateUI();
}
function tpPause(){
  TP.active=false;
  if(TP.raf){cancelAnimationFrame(TP.raf);TP.raf=null;}
  tpUpdateUI();
}
function tpToggle(){TP.active?tpPause():tpPlay();}
function tpFrame(ts){
  if(!TP.active)return;
  const el=document.getElementById('tp-overlay');
  if(!el){TP.active=false;return;}
  if(TP.lastTime){
    const dt=Math.min((ts-TP.lastTime)/1000,.05);
    el.scrollTop+=tpPxSpeed()*dt;
    if(el.scrollTop+el.clientHeight>=el.scrollHeight-30){tpPause();return;}
  }
  TP.lastTime=ts;
  TP.raf=requestAnimationFrame(tpFrame);
}
function tpSlower(){if(TP.speed>1){TP.speed--;tpUpdateUI();}}
function tpFaster(){if(TP.speed<5){TP.speed++;tpUpdateUI();}}
function tpReset(){const el=document.getElementById('tp-overlay');if(el)el.scrollTop=0;tpPause();}
function tpClose(){tpPause();TP.lastTime=null;doAction('closeTP');}
function tpUpdateUI(){
  const play=document.getElementById('tp-play');
  const spd=document.getElementById('tp-spd');
  const hint=document.getElementById('tp-hint');
  if(play)play.textContent=TP.active?'⏸':'▶';
  if(spd){const dots='●'.repeat(TP.speed)+'○'.repeat(5-TP.speed);spd.textContent=dots;}
  if(hint)hint.style.opacity=TP.active?'0':'1';
}

// ── HTML TEMPLATES ────────────────────────────────────────
function cleanScript(text){
  // Strip [SECTION LABEL] lines and normalize whitespace
  return text
    .replace(/^\[[^\]]+\]\s*\n?/gm,'')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
}
function parseSections(text){
  // Extract [LABEL]\ncontent blocks
  const re=/\[([^\]]+)\]\n?((?:(?!\n\[)[\s\S])*)/g;
  const secs=[];let m;
  while((m=re.exec(text))!==null){
    const content=m[2].trim();
    if(content) secs.push({k:m[1].trim(),text:content});
  }
  return secs.length>=2?secs:null;
}
function rebuildFromSections(secs){
  return secs.map(s=>'['+s.k+']\n'+s.text).join('\n\n');
}
function updateSection(ri,sk,val){
  const secs=parseSections(S.results[ri]);
  if(!secs){S.results[ri]=val;return;}
  const updated=secs.map(s=>s.k===sk?{...s,text:val}:s);
  S.results[ri]=rebuildFromSections(updated);
}

  const pillarItems=kb.pillars.map(p=>`<div class="kbi"><div class="min0"><p class="sm semi kbi-label">${esc(p.title)}</p>${p.desc?`<p class="xs muted mt1">${esc(p.desc)}</p>`:''}</div><button class="btn-del shrink0" data-action="delPillar:${p.id}">${ICO.trs}</button></div>`).join('');
  const docItems=kb.documents.map(doc=>`<div class="kbi"><div class="flex g2 items-c min0">${ICO.fil}<div class="min0"><p class="sm truncate">${esc(doc.name)}</p><p class="xs muted">${doc.text.length.toLocaleString()} chars</p></div></div><button class="btn-del shrink0" data-action="delDoc:${doc.id}">${ICO.trs}</button></div>`).join('');
  const links=kb.links||[];
  const linkItems=links.map(l=>{
    const fetched=l.status==='done',fetching=l.status==='fetching',err=l.status==='error';
    return `<div class="kbi">
      <div class="flex col min0 g1">
        <p class="sm truncate">${ICO.lnk} ${esc(l.url)}</p>
        ${fetched?`<p class="xs muted">${l.text.length.toLocaleString()} chars fetched</p>`:''}
        ${err?`<p class="xs c-rose">${esc(l.error||'Error')}</p>`:''}
        ${l.status==='pending'?`<p class="xs muted">Not fetched yet</p>`:''}
        ${fetching?`<p class="xs muted">${ICO.ldr} Fetching…</p>`:''}
      </div>
      <div class="flex g2 items-c shrink0">
        ${!fetching?`<button class="btn-g" data-action="fetchLink:${l.id}">${fetched?'↻ Refresh':'Fetch'}</button>`:''}
        <button class="btn-del" data-action="delLink:${l.id}">${ICO.trs}</button>

  const pdfNote=S.provider==='openai'?`<p class="xs c-rose mt2">${ICO.alr} PDF upload not supported with OpenAI — use "Paste text" instead.</p>`:'';
  return `<div class="space10 max-2xl">
    <div>${sh('Core information')}
      <div class="space4">
        <div><label class="sm semi mb1" style="display:block">About ${esc(S.conf?.creator||'you')}</label>
          <p class="xs muted mb2">Background, how you think and talk, what you stand for, phrases you use — and never use.</p>
          <textarea id="kb-about" class="ta" rows="4" oninput="S.kb.about=this.value">${esc(kb.about)}</textarea>
        </div>
        <div><label class="sm semi mb1" style="display:block">${esc(S.conf?.brand||'Brand / Product')}</label>
          <p class="xs muted mb2">What your product or service does, who it's for, and what makes it different.</p>
          <textarea id="kb-multibase" class="ta" rows="4" oninput="S.kb.brand=this.value">${esc(kb.brand)}</textarea>
        </div>
        <div class="flex g3 items-c"><button class="btn-sv" data-action="saveKB">Save</button>${kbOk?`<span class="sm dim">Saved ✓</span>`:''}</div>
      </div>
    </div>
    <div>${sh('Links')}
      <p class="xs muted mb4">URLs fetched as live knowledge — the content becomes part of every prompt.</p>
      ${!links.length?empty('No links yet'):linkItems?`<div class="space4 mb3">${linkItems}</div>`:''}
      <div class="flex g2">
        <input id="newlink-input" class="inp f1" placeholder="https://…" value="${esc(newLink)}" oninput="S.newLink=this.value" onkeydown="if(event.key==='Enter')doAction('addLink')"/>
        <button class="btn-sq w32h32" style="height:38px" data-action="addLink">${ICO.pls}</button>
      </div>
    </div>
    <div>${sh('Proof points')}
      <p class="xs muted mb4">Specific numbers, results, client wins.</p>
      ${!kb.proofPoints.length?empty('No proof points yet','"Reduced reporting from 3 days to 4 hours for a Swiss retailer"'):`<div class="space4 mb3">${proofItems}</div>`}
      <div class="flex g2">
        <input id="nproof-input" class="inp f1" placeholder='"30% faster reporting after switching in Q3"' value="${esc(nProof)}" oninput="S.nProof=this.value" onkeydown="if(event.key==='Enter')doAction('addProof')"/>

      <div class="border rlg p3 space4">
        <input id="styleex-title" class="inp" placeholder='Title, e.g. "LinkedIn POV — best performing June 2025"' oninput="S.styleExTitle=this.value"/>
        <textarea id="styleex-text" class="ta" rows="5" placeholder="Paste the full script text here…" oninput="S.styleExText=this.value"></textarea>
        <button class="flex g2 items-c sm dim t" data-action="addStyleEx" style="cursor:pointer">${ICO.pls} Add reference script</button>
      </div>
    </div>
    <div>${sh('Documents')}
      <p class="xs muted mb4">Upload PDFs or paste text as source material.</p>
      ${kb.documents.length>0?`<div class="space4 mb4">${docItems}</div>`:''}
      <div class="flex g2 mb3">
        <button class="chip rfull${docMode==='pdf'?' on':''}" data-action="docMode:pdf">Upload PDF</button>
        <button class="chip rfull${docMode==='text'?' on':''}" data-action="docMode:text">Paste text</button>
      </div>
      ${docMode==='pdf'?extracting?`<div class="border rlg flex g2 items-c px4 py4">${ICO.ldr} <span class="sm dim">Reading document…</span></div>`:`<label class="upload" style="cursor:pointer">${ICO.fil}<span class="sm dim">Click to upload a PDF</span><span class="xs muted">Max 10MB</span><input type="file" accept=".pdf,application/pdf" style="display:none" onchange="uploadPDF(this)"/></label>`:
      `<div class="border rlg p3 space4">
        <input id="doctitle-input" class="inp" placeholder="Document title" value="${esc(docTitle)}" oninput="S.docTitle=this.value"/>
        <textarea id="doctext-input" class="ta" rows="4" placeholder="Paste content here…" oninput="S.docText=this.value">${esc(docText)}</textarea>
        <button class="flex g2 items-c sm dim t" data-action="addTextDoc" style="cursor:pointer">${ICO.pls} Add document</button>
      </div>`}
      ${pdfNote}
      ${docErr?`<p class="flex g2 items-c xs c-rose mt2">${ICO.alr} ${esc(docErr)}</p>`:''}
    </div>
  </div>`;
}

function renderHistory(){
  const{hist}=S;
  if(!hist.length) return empty('No scripts saved yet','Generate your first one in Studio and save it');
  return `<div class="space4">${hist.slice().reverse().map(item=>{
    const p=plOf(item.platform),o=p&&p.objectives.find(x=>x.key===item.objective);
    const vars=item.variants||(item.script?[item.script]:[]);
    return `<details class="border rlg px4 py3">
      <summary class="fm xs caps muted" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <span>
          ${p?p.label:item.platform} <span style="color:#3f3f46">×</span> ${o?o.label:item.objective}
          <span style="color:#3f3f46"> · </span>${(item.lang||'en').toUpperCase()}
          <span style="color:#3f3f46"> · </span>${new Date(item.ts).toLocaleDateString('en-GB')}
          ${vars.length>1?`<span style="color:#3f3f46"> · ${vars.length} variants</span>`:''}
        </span>
        <button class="btn-del shrink0" onclick="event.stopPropagation();doAction('delHist:${item.id}')">${ICO.trs}</button>
      </summary>
      ${item.topic?`<p class="fm xs muted mt2 mb3">"${esc(item.topic)}"</p>`:''}
      <div class="space4">${vars.map((v,i)=>`${vars.length>1?`<p class="vl xs mb1">Variant ${i+1}</p>`:''}<p class="sm prewrap lh-loose" style="color:#a1a1aa">${esc(v)}</p>`).join('<br>')}</div>
    </details>`;
  }).join('')}</div>`;
}

// ── ACTIONS ───────────────────────────────────────────────
function doAction(action){
  const[cmd,...rest]=action.split(':'); const arg=rest.join(':');
  switch(cmd){
    // setup
    case 'setupProv': S.setupProvider=arg;render();break;
    case 'setupStep': S.setupStep=parseInt(arg);render();break;
    case 'submitSetup':{
      const el=document.getElementById('setup-key-input');
      const k=(el?el.value:S.setupKey).trim();
      const prov=PROVIDERS[S.setupProvider];
      if(!prov.keyCheck(k)){S.setupErr='Key format looks wrong — check and try again.';render();break;}
      S.keys[S.setupProvider]=k;S.provider=S.setupProvider;
      const firstModel=PROVIDERS[S.setupProvider].models[0]?.id;
      if(firstModel)S.model=firstModel;
      persistConf();render();autoFetchPendingLinks();break;}
    // settings overlay
    case 'openSettings': S.showSettings=true;S.settingsTab=S.provider;S.settingsTmpKey='';S.settingsErr='';render();break;
    case 'closeSettings': S.showSettings=false;render();break;
    case 'settingsTab': S.settingsTab=arg;S.settingsTmpKey='';S.settingsErr='';render();break;
    case 'setModel':
      if(S.settingsTab===S.provider) S.model=arg;
      persistConf();render();break;
    case 'saveProvKey':{
      const el=document.getElementById('settings-key-input');
      const k=(el?el.value:S.settingsTmpKey).trim();
      const prov=PROVIDERS[arg];
      if(!prov||!prov.keyCheck(k)){S.settingsErr='Key format looks wrong.';render();break;}
      S.keys[arg]=k;S.provider=arg;
      S.model=PROVIDERS[arg].models[0]?.id||S.model;
      S.showSettings=false;persistConf();render();autoFetchPendingLinks();break;}
    case 'activateProv':
      S.provider=arg;S.model=PROVIDERS[arg].models[0]?.id||S.model;
      S.showSettings=false;persistConf();render();break;
    case 'clearProvKey':
      S.keys[arg]=null;
      if(S.provider===arg){S.provider='gemini';S.model='gemini-2.5-flash';}
      persistConf();render();break;
    // main
    case 'tab':S.tab=arg;render();break;
    case 'platform':S.selPl=arg;S.selObj=null;S.selIdx=null;S.genIdeas=[];S.results=[];S.scriptErr=null;S.savedHist=false;render();break;
    case 'objective':S.selObj=arg;S.duration=durDefault(arg);S.results=[];S.scriptErr=null;S.savedHist=false;render();break;
    case 'genIdeas':genIdeasFn();break;
    case 'useIdea':{const i=parseInt(arg);const idea=S.genIdeas[i];if(!idea)break;S.topic=idea.title;S.selPl=idea.platform;S.selObj=idea.objective;S.selIdx=i;S.results=[];S.scriptErr=null;S.savedHist=false;render();break;}
    case 'saveIdea':{const idea=S.genIdeas[parseInt(arg)];if(!idea||S.ideas.some(x=>x.title===idea.title))break;S.ideas=[...S.ideas,{id:uid(),title:idea.title,desc:idea.angle||''}];persist();render();break;}
    case 'useTopic':S.topic=arg;S.selIdx=null;render();break;
    case 'showQA':S.showQA=true;render();setTimeout(()=>{const el=document.getElementById('qa-input');if(el)el.focus();},50);break;
    case 'hideQA':S.showQA=false;S.qaText='';render();break;
    case 'quickAdd':{const qel=document.getElementById('qa-input');const qt=(qel?qel.value:S.qaText).trim();if(!qt)break;S.ideas=[...S.ideas,{id:uid(),title:qt,desc:''}];S.topic=qt;S.showQA=false;S.qaText='';persist();render();break;}
    case 'lang':S.lang=arg;render();break;
    case 'setDuration':S.duration=parseInt(arg);render();break;
    case 'openTP':{tpPause();TP.lastTime=null;S.showTP=true;S.tpIdx=parseInt(arg)||0;render();break;}
    case 'closeTP':{tpPause();TP.lastTime=null;S.showTP=false;render();break;}
    case 'nv':S.nv=parseInt(arg);render();break;
    case 'genScript':{const tel=document.getElementById('topic-input');if(tel)S.topic=tel.value;genScriptFn();break;}
    case 'copy':copyScript(parseInt(arg));break;
    case 'delHist':{S.hist=S.hist.filter(h=>h.id!==arg);persist();render();break;}
    case 'saveConf':{
      const cr=document.getElementById('conf-creator')?.value?.trim();
      const br=document.getElementById('conf-brand')?.value?.trim();
      if(cr||br){S.conf={creator:cr||S.conf?.creator||'',brand:br||S.conf?.brand||''};localStorage.setItem('ss-conf-v2',JSON.stringify(S.conf));}
      render();break;}
    case 'saveHist':{if(!S.results.length)break;const entry={id:uid(),platform:S.selPl,objective:S.selObj,lang:S.lang,topic:S.topic,ts:Date.now(),variants:S.results};S.hist=[...S.hist,entry];persist();S.savedHist=true;render();setTimeout(()=>{S.savedHist=false;},2000);break;}
    case 'saveKB':persist();S.kbOk=true;render();setTimeout(()=>{S.kbOk=false;},2000);break;
    case 'addProof':{const pel=document.getElementById('nproof-input');const pt=(pel?pel.value:S.nProof).trim();if(!pt)break;S.kb.proofPoints=[...S.kb.proofPoints,{id:uid(),text:pt}];S.nProof='';persist();render();break;}
    case 'delProof':S.kb.proofPoints=S.kb.proofPoints.filter(p=>p.id!==arg);persist();render();break;
    case 'addPillar':{const ple=document.getElementById('pilt-input');const pde=document.getElementById('pild-input');const pt=(ple?ple.value:S.pilT).trim();if(!pt)break;S.kb.pillars=[...S.kb.pillars,{id:uid(),title:pt,desc:(pde?pde.value:S.pilD).trim()}];S.pilT='';S.pilD='';persist();render();break;}
    case 'delPillar':S.kb.pillars=S.kb.pillars.filter(p=>p.id!==arg);persist();render();break;
    case 'addTextDoc':{const dte=document.getElementById('doctitle-input');const dxe=document.getElementById('doctext-input');const dn=(dte?dte.value:S.docTitle).trim();const dx=(dxe?dxe.value:S.docText).trim();if(!dn||!dx)break;S.kb.documents=[...S.kb.documents,{id:uid(),name:dn,text:dx}];S.docTitle='';S.docText='';persist();render();break;}
    case 'delDoc':S.kb.documents=S.kb.documents.filter(d=>d.id!==arg);persist();render();break;
    case 'addStyleEx':{const te=document.getElementById('styleex-text');const ti=document.getElementById('styleex-title');const txt=(te?te.value:'').trim();const ttl=(ti?ti.value:'').trim();if(!txt||!ttl)break;S.kb.styleExamples=[...S.kb.styleExamples,{id:uid(),title:ttl,text:txt}];persist();render();break;}
    case 'delStyleEx':S.kb.styleExamples=S.kb.styleExamples.filter(s=>s.id!==arg);persist();render();break;
    case 'docMode':S.docMode=arg;S.docErr=null;render();break;
    case 'addLink':{const nle=document.getElementById('newlink-input');if(nle)S.newLink=nle.value;const url=S.newLink.trim();if(!url)break;const normalized=url.startsWith('http')?url:'https://'+url;S.kb.links=[...S.kb.links,{id:uid(),url:normalized,text:'',status:'pending'}];S.newLink='';persist();render();fetchLinkFn(S.kb.links[S.kb.links.length-1].id);break;}
    case 'delLink':S.kb.links=S.kb.links.filter(l=>l.id!==arg);persist();render();break;
    case 'fetchLink':fetchLinkFn(arg);break;
  }
}

// ── API CALLS ─────────────────────────────────────────────
async function genIdeasFn(){
  S.genLoading=true;S.genErr=null;S.genIdeas=[];S.selIdx=null;render();
  try{
    const pl=plOf(S.selPl),obj=pl&&objOf(S.selPl,S.selObj);
    let instr,okeys;
    if(pl&&obj){instr=`Generate ALL 8 ideas for ${pl.label} with objective "${obj.label}" ONLY.`;okeys=obj.key;}
    else if(pl){instr=`Generate ALL 8 ideas for ${pl.label} ONLY.`;okeys=pl.objectives.map(o=>o.key).join('|');}
    else{instr='Generate ideas covering a mix of all platforms.';okeys='pov|bts|case|cta_li|scroll|agitation|story|offer|hero|hiw|proof|close|intro|episode|hottake|keypoints';}
    const raw=await callAI(
      'You generate specific, actionable video script ideas for '+( S.conf?.creator||'the creator')+' grounded in their knowledge base.\n\n'+kbToStr(S.kb)+(S.prevIdeaTitles.length?'\n\nDO NOT generate any of these previously used ideas:\n'+S.prevIdeaTitles.map(t=>'- '+t).join('\n'):'')+'\n\n[variation:'+Math.random().toString(36).slice(2,7)+']',
      `Generate exactly 8 script ideas. ${instr}\nReturn ONLY a valid JSON array:\n[{"title":"...","platform":"linkedin|meta|landing|podcast","objective":"${okeys}","angle":"one sentence"}]`,
      1500
    );
    const si=raw.indexOf('['),ei=raw.lastIndexOf(']');
    if(si===-1||ei===-1)throw new Error();
    const parsed=JSON.parse(raw.slice(si,ei+1));
    const valid=parsed.filter(idea=>{
      if(!idea.title)return false;
      if(S.selPl&&idea.platform!==S.selPl)return false;
      if(S.selObj&&idea.objective!==S.selObj)return false;
      return PL.some(p=>p.key===idea.platform&&p.objectives.some(o=>o.key===idea.objective));
    }).slice(0,8);
    if(!valid.length)throw new Error();
    // shuffle so the "most obvious" idea isn't always first
    for(let i=valid.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[valid[i],valid[j]]=[valid[j],valid[i]];}
    S.prevIdeaTitles=[...S.prevIdeaTitles,...valid.map(x=>x.title)].slice(-24);
    S.genIdeas=valid;
  }catch(e){S.genErr='Generation failed: '+(e.message||'try again')+'.';}
  finally{S.genLoading=false;render();}
}
async function genScriptFn(){
  const pl=plOf(S.selPl),obj=pl&&objOf(S.selPl,S.selObj);
  if(!pl||!obj||!S.topic.trim()||S.generating)return;
  S.generating=true;S.scriptErr=null;S.results=[];S.savedHist=false;S.copiedIdx=null;render();
  try{
    const _sv=Math.random().toString(36).slice(2,7);
    const raw=await callAI(buildSys(pl,obj,S.lang,S.nv),'Topic: '+S.topic.trim()+(S.notes.trim()?'\n\nNotes: '+S.notes.trim():'')+'\n\n[session:'+_sv+']',4000);
    if(!raw)throw new Error();
    if(S.nv>1){const parts=raw.split(/\n---\n|---\n|\n---/).map(p=>p.replace(/^VARIANT\s*\d+[\s\S]{0,4}\n/i,'').trim()).filter(p=>p.length>30);S.results=parts.length>0?parts.slice(0,S.nv):[raw];}
    else{S.results=[raw];}
  }catch(e){S.scriptErr='Generation failed: '+(e.message||'try again')+'.';}
  finally{S.generating=false;render();}
}
async function uploadPDF(input){
  const f=input.files&&input.files[0];if(!f)return;
  if(f.size>10*1024*1024){S.docErr='File too large (max 10MB).';render();return;}
  S.extracting=true;S.docErr=null;render();
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});
    const txt=await callAIPDF(b64,'Extract key information: main arguments, data points, examples, facts. Plain text.');
    if(!txt)throw new Error();
    S.kb.documents=[...S.kb.documents,{id:uid(),name:f.name.replace('.pdf',''),text:txt}];persist();
  }catch(e){S.docErr=e.message||'Extraction failed. Try again or paste text manually.';}
  finally{S.extracting=false;input.value='';render();}
}
async function fetchLinkFn(id){
  const link=S.kb.links.find(l=>l.id===id);if(!link)return;
  link.status='fetching';render();
  try{
    const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),20000);
    const rsp=await fetch('https://r.jina.ai/'+link.url,{signal:ctrl.signal,headers:{'Accept':'text/plain','X-Return-Format':'text','X-No-Cache':'true'}});
    clearTimeout(timer);if(!rsp.ok)throw new Error('HTTP '+rsp.status);
    const text=await rsp.text();if(!text||text.length<50)throw new Error('Empty response');
    link.text=text.slice(0,5000);link.status='done';link.error=null;
  }catch(e){link.status='error';link.error=e.name==='AbortError'?'Timed out.':'Could not fetch. Check the URL.';}
  persist();render();
}
function autoFetchPendingLinks(){(S.kb.links||[]).filter(l=>l.status==='pending').forEach(l=>fetchLinkFn(l.id));}
async function copyScript(idx){
  try{await navigator.clipboard.writeText(cleanScript(S.results[idx]||''));S.copiedIdx=idx;render();setTimeout(()=>{S.copiedIdx=null;render();},2000);}catch(e){}
}

// ── RENDER + EVENTS ───────────────────────────────────────
function render(){
  const app=document.getElementById('app');if(!app)return;
  app.innerHTML=currentKey()?renderMain():renderSetup();
}
document.addEventListener('DOMContentLoaded',function(){
  const app=document.getElementById('app');
  app.addEventListener('click',function(e){
    const el=e.target.closest('[data-action]');
    if(el){e.preventDefault();doAction(el.getAttribute('data-action'));}
  });
  render();
  if(currentKey())autoFetchPendingLinks();
});
document.addEventListener('keydown',function(e){
  if(!S.showTP)return;
  if(e.key===' '||e.key==='Spacebar'){e.preventDefault();tpToggle();}
  else if(e.key==='Escape'){tpClose();}
  else if(e.key==='-'||e.key==='ArrowLeft'){tpSlower();}
  else if(e.key==='+'||e.key==='ArrowRight'){tpFaster();}
  else if(e.key==='r'||e.key==='R'){tpReset();}
});
